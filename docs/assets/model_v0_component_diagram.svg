<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fbfaf7"/>
  <text x="48" y="58" font-family="Arial" font-size="30" font-weight="700" fill="#1f2d36">BrainOmni-style EEG Voice Model v0</text>
  <text x="48" y="88" font-family="Arial" font-size="15" fill="#53636d">EEG tokenization, controlled phoneme probes, and speaker-stream retrieval. No waveform generation in v0.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#53636d"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#23343d; stroke-width:1.6; rx:8; }
      .sub { fill:#eef5f4; stroke:#3d6f68; stroke-width:1.3; rx:8; }
      .head { fill:#f7efe7; stroke:#9b6848; stroke-width:1.3; rx:8; }
      .txt { font-family:Arial; font-size:15px; fill:#1f2d36; }
      .small { font-family:Arial; font-size:12px; fill:#53636d; }
      .arrow { stroke:#53636d; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="48" y="145" width="170" height="90"/>
  <text class="txt" x="72" y="178">EEG window</text>
  <text class="small" x="72" y="203">[B, C, T]</text>

  <rect class="box" x="48" y="275" width="170" height="90"/>
  <text class="txt" x="72" y="308">Sensor metadata</text>
  <text class="small" x="72" y="333">pos [B,C,3] + mask</text>

  <rect class="sub" x="285" y="145" width="210" height="90"/>
  <text class="txt" x="314" y="178">Temporal encoder</text>
  <text class="small" x="314" y="203">SEANet-like Conv1D</text>

  <rect class="sub" x="285" y="275" width="210" height="90"/>
  <text class="txt" x="314" y="308">Sensor embedding</text>
  <text class="small" x="314" y="333">coordinate + channel mask</text>

  <rect class="sub" x="555" y="190" width="230" height="120"/>
  <text class="txt" x="590" y="230">Latent neural queries</text>
  <text class="small" x="590" y="255">Q=16 cross-attend channels</text>
  <text class="small" x="590" y="278">z [B,Q,W,D]</text>

  <rect class="sub" x="845" y="190" width="170" height="120"/>
  <text class="txt" x="884" y="230">RVQ</text>
  <text class="small" x="875" y="255">512 codes x 4</text>
  <text class="small" x="875" y="278">tokens [B,Q,W,4]</text>

  <rect class="sub" x="1070" y="145" width="160" height="90"/>
  <text class="txt" x="1094" y="178">Decoder</text>
  <text class="small" x="1094" y="203">EEG x_rec [B,C,T]</text>

  <rect class="head" x="1070" y="285" width="160" height="90"/>
  <text class="txt" x="1094" y="318">Probe heads</text>
  <text class="small" x="1094" y="343">phoneme / F0 / style</text>

  <rect class="head" x="1070" y="425" width="160" height="100"/>
  <text class="txt" x="1094" y="458">Voice retrieval</text>
  <text class="small" x="1094" y="483">InfoNCE with audio</text>

  <rect class="box" x="820" y="445" width="190" height="80"/>
  <text class="txt" x="846" y="477">Audio features</text>
  <text class="small" x="846" y="502">F0 + intensity + timbre</text>

  <path class="arrow" d="M218 190 L285 190"/>
  <path class="arrow" d="M218 320 L285 320"/>
  <path class="arrow" d="M495 190 L555 235"/>
  <path class="arrow" d="M495 320 L555 270"/>
  <path class="arrow" d="M785 250 L845 250"/>
  <path class="arrow" d="M1015 228 L1070 190"/>
  <path class="arrow" d="M930 310 L1070 330"/>
  <path class="arrow" d="M930 310 L1070 475"/>
  <path class="arrow" d="M1010 485 L1070 475"/>

  <text class="small" x="48" y="650">Stage 1 loss: L_time + L_freq_amp + 0.5 L_freq_phase + exp(-PCC) + L_commit</text>
  <text class="small" x="48" y="675">Stage 2 heads: ds006104 CE probes, ds005345 EEG/audio contrastive retrieval, optional F0/intensity attributes.</text>
</svg>
